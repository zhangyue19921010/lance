      interval: "weekly"
      day: "wednesday"

  - package-ecosystem: "cargo"
    directory: "/python"
    versioning-strategy: lockfile-only
    schedule:
      interval: "weekly"
      day: "wednesday"

  - package-ecosystem: "cargo"
    directory: "/java/lance-jni"
    versioning-strategy: lockfile-only
