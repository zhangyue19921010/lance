name: PR Checks

on:
  # This needs to be a pull_request_target event to allow the workflow to
  # modify labels on the PR.
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    permissions:
      pull-requests: write
    name: Label PR
    runs-on: ubuntu-latest
    steps:
      - uses: srvaroa/labeler@bf262763a8a8e191f5847873aecc0f29df84f957 # v1.14.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail_on_error: true
  format-vote-reminder:
    permissions:
      pull-requests: write
    name: Remind about format spec vote
    runs-on: ubuntu-latest
    # Comments on PRs that touch the Lance format specification (*.proto files
    # and docs/src/format/**) to remind the author that substantive format
    # changes require a PMC vote. Re-checks the full PR diff on every push, so a
    # format change introduced by a later commit is still caught; a hidden
    # marker keeps it to at most one comment.
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const MARKER = '<!-- format-change-vote-reminder -->';

            // The Lance format specification is the proto definitions plus the
            // spec docs. Changes to either require a PMC vote.
            const isFormatFile = (path) =>
              path.endsWith('.proto') || path.startsWith('docs/src/format/');

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber, per_page: 100,
            });
            const formatFiles = files.map((f) => f.filename).filter(isFormatFile);
            if (formatFiles.length === 0) {
              core.info('No format specification files changed; nothing to do.');
              return;
            }

            // Best effort to comment only once: skip if our marker is present.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            if (comments.some((c) => c.body && c.body.includes(MARKER))) {
              core.info('Reminder already posted; skipping.');
              return;
            }

            const body = [
              MARKER,
              '> [!IMPORTANT]',
              '> **This PR touches the Lance format specification.**',
              '>',
              '> Substantive changes to the format specification — the `.proto` definitions',
              '> and the spec docs under `docs/src/format/` — require a PMC vote before merge.',
              '> Minor edits such as typo fixes, wording, or formatting are excluded; use your',
              '> judgment.',
              '>',
              '> If this is a meaningful format change:',
              '> - Start a vote following the [Lance community voting process](https://lance.org/community/voting/).',
              '>   Format specification modifications need **3 binding +1 votes** (excluding the',
              '>   proposer), held on GitHub Discussions, with a minimum voting period of **1 week**.',
              '> - Once the vote passes, **link the completed vote in this PR**. It should not be',
              '>   merged until the vote is linked.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body,
            });
            core.info(`Posted format vote reminder (changed: ${formatFiles.join(', ')}).`);
  commitlint:
    permissions:
      pull-requests: write
    name: Verify PR title / description conforms to semantic-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      # These rules are disabled because Github will always ensure there
      # is a blank line between the title and the body and Github will
      # word wrap the description field to ensure a reasonable max line
      # length.
      - run: npm install @commitlint/config-conventional
      - run: >
          echo 'module.exports = {
            "rules": {
              "body-max-line-length": [0, "always", Infinity],
              "footer-max-line-length": [0, "always", Infinity],
              "body-leading-blank": [0, "always"]
            }
          }' > .commitlintrc.js
      - name: Write commit message to file
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const title = context.payload.pull_request.title || '';
            const body = context.payload.pull_request.body || '';
            fs.writeFileSync(process.env.RUNNER_TEMP + '/commit_msg.txt', title + '\n\n' + body);
      - run: npx commitlint --extends @commitlint/config-conventional --verbose < "$RUNNER_TEMP/commit_msg.txt"
      - if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const message = `**ACTION NEEDED**
              Lance follows the [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/) for release automation.

              The PR title and description are used as the merge commit message.\
              Please update your PR title and description to match the specification.

              For details on the error please inspect the "PR Title Check" action.
              `
            // Get list of current comments
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            // Check if this job already commented
            for (const comment of comments) {
              if (comment.body === message) {
                return // Already commented
              }
            }
            // Post the comment about Conventional Commits
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            })
            core.setFailed(message)
